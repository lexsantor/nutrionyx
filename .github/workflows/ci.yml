name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build
        env:
          # Build-time placeholders only - real values live in Vercel.
          NEON_AUTH_BASE_URL: https://example.invalid/neondb/auth
          NEON_AUTH_COOKIE_SECRET: ci-build-placeholder-secret-32-chars
